# 车辆参数配置 — 北京地铁9号线 SFM05 型列车（B型车，6节编组 Tc-M-M-M-M-Tc）
# 所有物理量采用 SI 单位，速度相关字段以 km/h 标注。
# 牵引/制动曲线源自用户提供的单电机转矩数据，经齿轮比 i=6.0 换算为力
vehicle:
  id: SFM05-9
  name: SFM05型B车（9号线）
  direction: "down"
  empty_mass: 225000            # 空车质量 (kg)，AW0: Tc=34500 + M×4=39000×4 = 225000kg
  passenger_capacity: 1460      # 满员载客人数（AW2，6节B型车）
  max_speed: 80                 # 构造速度 (km/h)
  max_traction_force: 217649    # 最大牵引力 (N)，单电机最大转矩1042.9N·m × 16电机 × 齿轮比6.0 / 轮半径0.46m
  max_brake_force: 204042       # 最大制动力 (N)，单电机最大制动转矩977.7N·m × 16 × 6.0 / 0.46
  davis_a: 0.002066             # Davis A 系数（滚动阻力，归一化），来自标准Davis公式 6.4M+130n
  davis_b: 0.00005138           # Davis B 系数（线性项，按 m/s），来自标准Davis公式 0.14Mv
  davis_c_front_area: 10.6      # 迎风面积 (m^2)，B型车标准截面
  davis_c_drag_coeff: 1.661     # 空气阻力系数，从标准Davis公式 [0.046+0.0065(N-1)]A 反算
  curve_resist_coeff: 600       # 弯道阻力经验系数 k
  tunnel_resist_factor: 1.2     # 隧道空气阻力加成
  regeneration_efficiency: 0.3  # 再生制动效率（VHC-09 预留）
  length: 118                   # 列车长度 (m)，头车20.2m×2 + 中间车19.4m×4 = 118m
  traction_curve:               # 牵引特性曲线（速度 km/h → 可用牵引力百分比），基于单电机转矩曲线换算
    - { speed: 0.0, force_percent: 1.0000 }
    - { speed: 69.7, force_percent: 1.0000 }
    - { speed: 72.1, force_percent: 0.9942 }
    - { speed: 74.5, force_percent: 0.9311 }
    - { speed: 77.0, force_percent: 0.8737 }
    - { speed: 79.4, force_percent: 0.8217 }
    - { speed: 80.0, force_percent: 0.8083 }