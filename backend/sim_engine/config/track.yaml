# 线路配置 — MVP 验收场景 1：3 站 2 区间（A→B→C）
line:
  name: 1号线
  stations:
    - { id: ST01, name: A站, chainage: 0, dwell_time: 30 }
    - { id: ST02, name: B站, chainage: 1500, dwell_time: 30 }
    - { id: ST03, name: C站, chainage: 3200, dwell_time: 30 }
  segments:
    - id: SEC01
      start_chainage: 0
      end_chainage: 1500
      gradient: 5
      curvature: 800
      speed_limit: 80
      is_tunnel: false
    - id: SEC02
      start_chainage: 1500
      end_chainage: 3200
      gradient: 0
      curvature: 1200
      speed_limit: 80
      is_tunnel: false
