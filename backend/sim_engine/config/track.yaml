# 线路配置 — 北京地铁4号线（安河桥北→公益西桥）
# 下行方向，24站23区间，全长约18.6km
# 北段（安河桥北~国家图书馆）为地面/高架/地下过渡，南段（动物园~公益西桥）全地下
line:
  name: 4号线（下行）
  stations:
    - { id: ST01,  name: 安河桥北,     chainage: 0,     dwell_time: 35 }
    - { id: ST02,  name: 北宫门,       chainage: 1100,  dwell_time: 25 }
    - { id: ST03,  name: 西苑,         chainage: 2000,  dwell_time: 30 }
    - { id: ST04,  name: 圆明园,       chainage: 2800,  dwell_time: 25 }
    - { id: ST05,  name: 北京大学东门,   chainage: 3600,  dwell_time: 25 }
    - { id: ST06,  name: 中关村,       chainage: 4300,  dwell_time: 30 }
    - { id: ST07,  name: 海淀黄庄,     chainage: 5100,  dwell_time: 30 }
    - { id: ST08,  name: 人民大学,     chainage: 5800,  dwell_time: 25 }
    - { id: ST09,  name: 魏公村,       chainage: 6600,  dwell_time: 25 }
    - { id: ST10,  name: 国家图书馆,   chainage: 7300,  dwell_time: 30 }
    - { id: ST11,  name: 动物园,       chainage: 8300,  dwell_time: 30 }
    - { id: ST12,  name: 西直门,       chainage: 9200,  dwell_time: 40 }
    - { id: ST13,  name: 新街口,       chainage: 10000, dwell_time: 25 }
    - { id: ST14,  name: 平安里,       chainage: 10700, dwell_time: 30 }
    - { id: ST15,  name: 西四,         chainage: 11400, dwell_time: 25 }
    - { id: ST16,  name: 灵境胡同,     chainage: 12000, dwell_time: 25 }
    - { id: ST17,  name: 西单,         chainage: 12700, dwell_time: 35 }
    - { id: ST18,  name: 宣武门,       chainage: 13500, dwell_time: 25 }
    - { id: ST19,  name: 菜市口,       chainage: 14300, dwell_time: 25 }
    - { id: ST20,  name: 陶然亭,       chainage: 15200, dwell_time: 25 }
    - { id: ST21,  name: 北京南站,     chainage: 15900, dwell_time: 40 }
    - { id: ST22,  name: 马家堡,       chainage: 16900, dwell_time: 25 }
    - { id: ST23,  name: 角门西,       chainage: 17700, dwell_time: 25 }
    - { id: ST24,  name: 公益西桥,     chainage: 18600, dwell_time: 35 }

  segments:
    # 安河桥北→北宫门：高架段，坡度平缓，大曲率
    - id: SEC01
      start_chainage: 0
      end_chainage: 1100
      gradient: 8
      curvature: 600
      speed_limit: 80
      is_tunnel: false

    # 北宫门→西苑：地面→地下过渡段，下坡
    - id: SEC02
      start_chainage: 1100
      end_chainage: 2000
      gradient: -15
      curvature: 500
      speed_limit: 70
      is_tunnel: false

    # 西苑→圆明园：地下段，平缓
    - id: SEC03
      start_chainage: 2000
      end_chainage: 2800
      gradient: 3
      curvature: 800
      speed_limit: 80
      is_tunnel: true

    # 圆明园→北京大学东门：地下段
    - id: SEC04
      start_chainage: 2800
      end_chainage: 3600
      gradient: 5
      curvature: 1000
      speed_limit: 80
      is_tunnel: true

    # 北京大学东门→中关村：地下段，小弯道
    - id: SEC05
      start_chainage: 3600
      end_chainage: 4300
      gradient: 2
      curvature: 600
      speed_limit: 80
      is_tunnel: true

    # 中关村→海淀黄庄：地下段
    - id: SEC06
      start_chainage: 4300
      end_chainage: 5100
      gradient: 4
      curvature: 700
      speed_limit: 80
      is_tunnel: true

    # 海淀黄庄→人民大学：地下段，弯道较多
    - id: SEC07
      start_chainage: 5100
      end_chainage: 5800
      gradient: 3
      curvature: 500
      speed_limit: 75
      is_tunnel: true

    # 人民大学→魏公村：地下段
    - id: SEC08
      start_chainage: 5800
      end_chainage: 6600
      gradient: 6
      curvature: 800
      speed_limit: 80
      is_tunnel: true

    # 魏公村→国家图书馆：地下段
    - id: SEC09
      start_chainage: 6600
      end_chainage: 7300
      gradient: 2
      curvature: 1000
      speed_limit: 80
      is_tunnel: true

    # 国家图书馆→动物园：地下段，长直线
    - id: SEC10
      start_chainage: 7300
      end_chainage: 8300
      gradient: 5
      curvature: 1200
      speed_limit: 80
      is_tunnel: true

    # 动物园→西直门：地下段，接近西直门有大弯道
    - id: SEC11
      start_chainage: 8300
      end_chainage: 9200
      gradient: 8
      curvature: 400
      speed_limit: 65
      is_tunnel: true

    # 西直门→新街口：地下段，西直门始发上坡
    - id: SEC12
      start_chainage: 9200
      end_chainage: 10000
      gradient: 10
      curvature: 600
      speed_limit: 75
      is_tunnel: true

    # 新街口→平安里：地下段
    - id: SEC13
      start_chainage: 10000
      end_chainage: 10700
      gradient: 3
      curvature: 800
      speed_limit: 80
      is_tunnel: true

    # 平安里→西四：地下段
    - id: SEC14
      start_chainage: 10700
      end_chainage: 11400
      gradient: 4
      curvature: 700
      speed_limit: 80
      is_tunnel: true

    # 西四→灵境胡同：地下段，短区间
    - id: SEC15
      start_chainage: 11400
      end_chainage: 12000
      gradient: 2
      curvature: 900
      speed_limit: 80
      is_tunnel: true

    # 灵境胡同→西单：地下段
    - id: SEC16
      start_chainage: 12000
      end_chainage: 12700
      gradient: 5
      curvature: 600
      speed_limit: 80
      is_tunnel: true

    # 西单→宣武门：地下段，商业区弯道多
    - id: SEC17
      start_chainage: 12700
      end_chainage: 13500
      gradient: 3
      curvature: 450
      speed_limit: 70
      is_tunnel: true

    # 宣武门→菜市口：地下段
    - id: SEC18
      start_chainage: 13500
      end_chainage: 14300
      gradient: 6
      curvature: 800
      speed_limit: 80
      is_tunnel: true

    # 菜市口→陶然亭：地下段
    - id: SEC19
      start_chainage: 14300
      end_chainage: 15200
      gradient: 4
      curvature: 700
      speed_limit: 80
      is_tunnel: true

    # 陶然亭→北京南站：地下段，接近南站大弯道
    - id: SEC20
      start_chainage: 15200
      end_chainage: 15900
      gradient: 5
      curvature: 500
      speed_limit: 70
      is_tunnel: true

    # 北京南站→马家堡：地下段，出站上坡
    - id: SEC21
      start_chainage: 15900
      end_chainage: 16900
      gradient: 12
      curvature: 800
      speed_limit: 80
      is_tunnel: true

    # 马家堡→角门西：地下段
    - id: SEC22
      start_chainage: 16900
      end_chainage: 17700
      gradient: 3
      curvature: 600
      speed_limit: 80
      is_tunnel: true

    # 角门西→公益西桥：地下段，接近终点平缓
    - id: SEC23
      start_chainage: 17700
      end_chainage: 18600
      gradient: 2
      curvature: 1000
      speed_limit: 80
      is_tunnel: true