        initial_direction: down
        trip_legs: [down, up]
        train_id_prefix: D
        first_departure_s: 0
        headway_s: 150
      - origin_station: ST13
        initial_direction: up
        trip_legs: [up, down]
        train_id_prefix: U
        first_departure_s: 0
        headway_s: 150

